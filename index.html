<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Hatch Simulator</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
  }

  #clickBtn {
    font-size: 25px;
    padding: 15px;
    background: orange;
  }

  .petItem {
    font-size: 30px;
    margin: 5px;
    display: inline-block;
    padding: 5px;
    border-radius: 8px;
    cursor: pointer;
  }

  .common { border: 3px solid gray; }
  .rare { border: 3px solid blue; }
  .epic { border: 3px solid purple; }
  .legendary { border: 3px solid gold; }
  .mythic { border: 3px solid red; }
  .secret { border: 3px solid cyan; box-shadow: 0 0 10px cyan; }

</style>
</head>

<body>

<h1>🌍 Multi-Egg Simulator</h1>

<p>Coins: <span id="coins">0</span></p>
<p>Click Power: <span id="power">1</span></p>

<button id="clickBtn" onclick="clickCoins()">CLICK</button>

<h2>🥚 Eggs</h2>
<button onclick="selectEgg(0)">Basic Egg (10)</button>
<button onclick="selectEgg(1)">Forest Egg (50)</button>
<button onclick="selectEgg(2)">Mythic Egg (200)</button>

<p>Selected: <span id="currentEgg">Basic Egg</span></p>

<button onclick="hatch(1)">Hatch</button>
<button onclick="hatch(3)">3x Hatch</button>

<h2>⚔️ Equipped (Max 2)</h2>
<div id="equipped"></div>

<h2>🎒 Inventory</h2>
<div id="inventory"></div>

<script>
let coins = 0;
let inventory = [];
let equipped = [];
let maxEquip = 2;
let currentEgg = 0;

// MULTIPLE EGGS
const eggs = [
{
  name: "Basic Egg",
  cost: 10,
  pets: [
    {emoji:"🐶", rarity:"common", chance:50, power:1},
    {emoji:"🐱", rarity:"common", chance:40, power:1},
    {emoji:"🐰", rarity:"rare", chance:25, power:2},
    {emoji:"🐼", rarity:"epic", chance:10, power:4},
    {emoji:"🐉", rarity:"legendary", chance:3, power:8},
    {emoji:"🔥", rarity:"mythic", chance:1, power:15},
    {emoji:"👑", rarity:"secret", chance:0.2, power:50}
  ]
},
{
  name: "Forest Egg",
  cost: 50,
  pets: [
    {emoji:"🦊", rarity:"common", chance:50, power:2},
    {emoji:"🐻", rarity:"rare", chance:30, power:3},
    {emoji:"🦌", rarity:"epic", chance:15, power:6},
    {emoji:"🌳", rarity:"legendary", chance:5, power:12},
    {emoji:"🍀", rarity:"mythic", chance:1, power:25},
    {emoji:"🌈", rarity:"secret", chance:0.2, power:70}
  ]
},
{
  name: "Mythic Egg",
  cost: 200,
  pets: [
    {emoji:"😈", rarity:"epic", chance:40, power:8},
    {emoji:"👹", rarity:"legendary", chance:20, power:15},
    {emoji:"⚡", rarity:"mythic", chance:5, power:40},
    {emoji:"💎", rarity:"secret", chance:0.5, power:120}
  ]
}
];

// CLICK POWER
function getPower() {
  let total = 1;
  equipped.forEach(p => total += p.power);
  return total;
}

function clickCoins() {
  coins += getPower();
  updateUI();
}

// SELECT EGG
function selectEgg(index) {
  currentEgg = index;
  document.getElementById("currentEgg").textContent = eggs[index].name;
}

// HATCH
function hatch(amount) {
  const egg = eggs[currentEgg];
  let cost = egg.cost * amount;

  if (coins < cost) return alert("Not enough coins!");

  coins -= cost;

  for (let i = 0; i < amount; i++) {
    inventory.push(getPet(egg));
  }

  updateUI();
}

// RNG
function getPet(egg) {
  let total = egg.pets.reduce((sum, p) => sum + p.chance, 0);
  let rand = Math.random() * total;

  for (let pet of egg.pets) {
    rand -= pet.chance;
    if (rand <= 0) return {...pet};
  }
}

// INVENTORY
function renderInventory() {
  const inv = document.getElementById("inventory");
  inv.innerHTML = "";

  inventory.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "petItem " + p.rarity;
    div.textContent = p.emoji;
    div.onclick = () => equipPet(i);
    inv.appendChild(div);
  });
}

// EQUIP
function renderEquipped() {
  const eq = document.getElementById("equipped");
  eq.innerHTML = "";

  equipped.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "petItem " + p.rarity;
    div.textContent = p.emoji;
    div.onclick = () => unequipPet(i);
    eq.appendChild(div);
  });
}

function equipPet(i) {
  if (equipped.length >= maxEquip) return alert("Max 2 pets!");
  equipped.push(inventory[i]);
  inventory.splice(i, 1);
  updateUI();
}

function unequipPet(i) {
  inventory.push(equipped[i]);
  equipped.splice(i, 1);
  updateUI();
}

function updateUI() {
  document.getElementById("coins").textContent = coins;
  document.getElementById("power").textContent = getPower();
  renderInventory();
  renderEquipped();
}

updateUI();
</script>

</body>
</html>
